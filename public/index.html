<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BomiNuel — Healthy, Flavorful</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; background: #fff; color: #1a0a05; overflow-x: hidden; }

  /* NAV */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 60px;
    background: #fff;
    border-bottom: 0.5px solid #eeddd6;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 600;
    color: #1a0a05;
  }
  .nav-logo span { color: #b83020; }
  .nav-links { display: flex; gap: 36px; list-style: none; }
  .nav-links a { font-size: 14px; color: #4a2a1a; text-decoration: none; font-weight: 400; letter-spacing: 0.2px; transition: color 0.2s; }
  .nav-links a:hover { color: #b83020; }
  .nav-cta {
    background: #b83020;
    color: #fff;
    padding: 10px 24px;
    border-radius: 28px;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    transition: background 0.2s;
  }
  .nav-cta:hover { background: #96261a; }

  /* HERO */
  .hero {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 70px 60px 0;
    background: #fff;
    min-height: 500px;
    gap: 40px;
  }
  .hero-left { max-width: 520px; }
  .hero-badge {
    display: inline-block;
    background: #fdf0ec;
    color: #b83020;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 20px;
    margin-bottom: 22px;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    font-weight: 600;
    line-height: 1.12;
    margin-bottom: 20px;
    color: #1a0a05;
  }
  .hero h1 em { font-style: italic; color: #b83020; }
  .hero-sub {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 32px;
  }
  .hero-sub-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .hero-sub-icon {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1.5px solid #dcc0b0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .hero-sub-icon svg { width: 16px; height: 16px; stroke: #b83020; fill: none; stroke-width: 1.8; }
  .hero-sub-text h4 { font-size: 14px; font-weight: 500; color: #1a0a05; margin-bottom: 2px; }
  .hero-sub-text p { font-size: 13px; color: #7a5040; line-height: 1.5; }
  .hero-btns { display: flex; gap: 16px; align-items: center; }
  .btn-primary {
    background: #b83020;
    color: #fff;
    padding: 13px 30px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    transition: background 0.2s, transform 0.15s;
  }
  .btn-primary:hover { background: #96261a; transform: translateY(-1px); }
  .btn-ghost {
    color: #b83020;
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: gap 0.2s;
  }
  .btn-ghost:hover { gap: 10px; }
  .btn-ghost::after { content: '→'; font-size: 16px; }

  .hero-right {
    flex-shrink: 0;
    display: flex;
    align-items: flex-end;
    position: relative;
  }
  .hero-bottle-bg {
    width: 360px;
    height: 420px;
    background: linear-gradient(160deg, #fbe8e0 0%, #f5c8b8 100%);
    border-radius: 50% 50% 0 0 / 55% 55% 0 0;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    overflow: visible;
    position: relative;
  }
  .deco-hibiscus {
    position: absolute;
    top: 20px;
    left: -40px;
    font-size: 90px;
    opacity: 0.12;
    transform: rotate(-25deg);
    user-select: none;
    pointer-events: none;
  }
  .deco-hibiscus2 {
    position: absolute;
    top: 60px;
    right: -20px;
    font-size: 60px;
    opacity: 0.1;
    transform: rotate(15deg);
    user-select: none;
    pointer-events: none;
  }
  .hero-bottle-svg {
    width: 160px;
    margin-bottom: 0;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 20px 40px rgba(100,20,5,0.25));
  }
  .bottle-count-badge {
    position: absolute;
    top: 30px;
    right: -10px;
    background: #1a0a05;
    color: #fff;
    border-radius: 12px;
    padding: 10px 16px;
    font-size: 12px;
    font-weight: 500;
    line-height: 1.4;
    text-align: center;
  }
  .bottle-count-badge strong { display: block; font-size: 20px; font-weight: 600; color: #f5c0a0; }

  /* WAVE DIVIDER: white to pink */
  .wave-to-pink {
    background: #fff;
    line-height: 0;
  }
  .wave-to-pink svg { display: block; width: 100%; height: 80px; }

  /* HOSTING SECTION */
  .hosting {
    background: #fdf5f2;
    padding: 60px 60px 80px;
    text-align: center;
  }
  .section-eyebrow {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 12px;
  }
  .section-eyebrow span {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-style: italic;
    color: #b83020;
    letter-spacing: 0.3px;
  }
  .section-eyebrow::before,
  .section-eyebrow::after {
    content: '';
    width: 30px;
    height: 1.5px;
    background: #b83020;
    display: block;
  }
  .hosting h2 {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 600;
    color: #1a0a05;
    margin-bottom: 50px;
  }
  .carousel-wrap {
    display: flex;
    align-items: center;
    gap: 0;
  }
  .carousel-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #b83020;
    color: #fff;
    border: none;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 4px 16px rgba(184,48,32,0.35);
    transition: background 0.2s, transform 0.15s;
  }
  .carousel-btn:hover { background: #96261a; transform: scale(1.06); }
  .carousel-btn.prev { margin-right: 16px; }
  .carousel-btn.next { margin-left: 16px; }
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 22px;
    flex: 1;
    overflow: hidden;
  }
  .event-card {
    background: #fff;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 3px 18px rgba(80,20,5,0.08);
    transition: transform 0.25s, box-shadow 0.25s;
    cursor: pointer;
  }
  .event-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 12px 36px rgba(80,20,5,0.14);
  }
  .card-visual {
    height: 210px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .card-visual.birthday { background: linear-gradient(145deg, #ffe8f0 0%, #ffd0e0 100%); }
  .card-visual.wedding { background: linear-gradient(145deg, #fff8e0 0%, #fdebd0 100%); }
  .card-visual.naming { background: linear-gradient(145deg, #e8f8f0 0%, #cceedd 100%); }
  .card-visual.school { background: linear-gradient(145deg, #e8eeff 0%, #d0dcff 100%); }
  .card-deco {
    position: absolute;
    top: 12px;
    right: 14px;
    font-size: 26px;
    opacity: 0.55;
  }
  .card-tag {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(4px);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 10px;
    font-weight: 500;
    color: #b83020;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .card-name {
    padding: 16px 14px;
    font-size: 15px;
    font-weight: 500;
    color: #1a0a05;
    text-align: center;
  }

  /* WAVE: pink to dark */
  .wave-to-dark {
    background: #fdf5f2;
    line-height: 0;
  }
  .wave-to-dark svg { display: block; width: 100%; height: 80px; }

  /* ABOUT */
  .about {
    background: #160804;
    padding: 70px 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 60px;
  }
  .about-text { max-width: 500px; }
  .about-eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #b83020;
    margin-bottom: 14px;
  }
  .about h3 {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 18px;
    line-height: 1.2;
  }
  .about p {
    font-size: 15px;
    color: #c4a090;
    line-height: 1.8;
    margin-bottom: 14px;
  }
  .about-feature {
    display: flex;
    gap: 20px;
    margin-top: 28px;
  }
  .about-feat-item {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 0.5px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 18px 16px;
    text-align: center;
  }
  .about-feat-icon { font-size: 24px; margin-bottom: 8px; }
  .about-feat-title { font-size: 13px; font-weight: 500; color: #e0c0b0; }
  .about-bottles {
    display: flex;
    gap: 14px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  /* TESTIMONIALS */
  .testimonials {
    background: #fff;
    padding: 80px 60px;
    text-align: center;
  }
  .testimonials .section-eyebrow { margin-bottom: 12px; }
  .testimonials h2 {
    font-family: 'Playfair Display', serif;
    font-size: 38px;
    font-weight: 600;
    color: #1a0a05;
    margin-bottom: 48px;
  }
  .testimonials h2 em { font-style: italic; color: #b83020; }
  .testi-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 22px;
    text-align: left;
  }
  .testi-card {
    background: #fdf5f2;
    border-radius: 16px;
    padding: 28px 24px;
    border: 0.5px solid #f0ddd5;
    transition: box-shadow 0.2s;
  }
  .testi-card:hover { box-shadow: 0 6px 24px rgba(80,20,5,0.08); }
  .stars { color: #b83020; font-size: 14px; letter-spacing: 3px; margin-bottom: 12px; }
  .testi-quote {
    font-size: 14px;
    color: #4a2a1a;
    line-height: 1.75;
    margin-bottom: 18px;
    font-style: italic;
  }
  .testi-author { font-size: 13px; font-weight: 500; color: #1a0a05; }
  .testi-location { font-size: 12px; color: #9a6050; margin-top: 2px; }

  /* FOOTER */
  footer {
    background: #0a0300;
    color: #7a5040;
    text-align: center;
    padding: 24px 60px;
    font-size: 12px;
    letter-spacing: 0.5px;
    border-top: 0.5px solid rgba(255,255,255,0.06);
  }
  footer a { color: #b83020; text-decoration: none; }

  /* BOTTLE INLINE SVG utility */
  .bottle-inline {
    display: inline-block;
    filter: drop-shadow(0 8px 16px rgba(80,10,5,0.3));
  }
</style>
</head>
<body>



<!-- HOSTING SECTION -->
<section class="hosting" id="events">
  <div class="section-eyebrow"><span>Created for</span></div>
  <h2>Hosting Something?</h2>

  <div class="carousel-wrap">
    <button class="carousel-btn prev" onclick="slide(-1)">&#8592;</button>

    <div class="cards-grid" id="cardsGrid">

      <!-- Birthday -->
      <div class="event-card">
        <div class="card-visual birthday">
          <div class="card-deco">🎂</div>
          <svg width="62" height="130" viewBox="0 0 60 130" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs><linearGradient id="cb1" x1="0" y1="0" x2="60" y2="130" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#e84535"/><stop offset="100%" stop-color="#7a1810"/></linearGradient></defs>
            <rect x="22" y="0" width="16" height="10" rx="3" fill="#8a1c10"/>
            <rect x="19" y="8" width="22" height="8" rx="3" fill="#7a1810"/>
            <rect x="10" y="15" width="40" height="108" rx="10" fill="url(#cb1)"/>
            <rect x="13" y="34" width="34" height="60" rx="7" fill="rgba(255,255,255,0.12)"/>
            <text x="30" y="59" text-anchor="middle" font-family="Georgia,serif" font-size="5" fill="#fff" font-weight="bold">BomiNuel</text>
            <text x="30" y="70" text-anchor="middle" font-family="sans-serif" font-size="3.5" fill="#ffd0c0">Zobo Hibiscus</text>
          </svg>
          <div class="card-tag">Perfect for birthdays</div>
        </div>
        <div class="card-name">Birthday</div>
      </div>

      <!-- Weddings -->
      <div class="event-card">
        <div class="card-visual wedding">
          <div class="card-deco">💍</div>
          <svg width="62" height="130" viewBox="0 0 60 130" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs><linearGradient id="cb2" x1="0" y1="0" x2="60" y2="130" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#e84535"/><stop offset="100%" stop-color="#7a1810"/></linearGradient></defs>
            <rect x="22" y="0" width="16" height="10" rx="3" fill="#8a1c10"/>
            <rect x="19" y="8" width="22" height="8" rx="3" fill="#7a1810"/>
            <rect x="10" y="15" width="40" height="108" rx="10" fill="url(#cb2)"/>
            <rect x="13" y="34" width="34" height="60" rx="7" fill="rgba(255,255,255,0.12)"/>
            <text x="30" y="59" text-anchor="middle" font-family="Georgia,serif" font-size="5" fill="#fff" font-weight="bold">BomiNuel</text>
            <text x="30" y="70" text-anchor="middle" font-family="sans-serif" font-size="3.5" fill="#ffd0c0">Zobo Hibiscus</text>
          </svg>
          <div class="card-tag">Elevate your reception</div>
        </div>
        <div class="card-name">Weddings</div>
      </div>

      <!-- Naming Ceremonies -->
      <div class="event-card">
        <div class="card-visual naming">
          <div class="card-deco">👶</div>
          <svg width="62" height="130" viewBox="0 0 60 130" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs><linearGradient id="cb3" x1="0" y1="0" x2="60" y2="130" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#e84535"/><stop offset="100%" stop-color="#7a1810"/></linearGradient></defs>
            <rect x="22" y="0" width="16" height="10" rx="3" fill="#8a1c10"/>
            <rect x="19" y="8" width="22" height="8" rx="3" fill="#7a1810"/>
            <rect x="10" y="15" width="40" height="108" rx="10" fill="url(#cb3)"/>
            <rect x="13" y="34" width="34" height="60" rx="7" fill="rgba(255,255,255,0.12)"/>
            <text x="30" y="59" text-anchor="middle" font-family="Georgia,serif" font-size="5" fill="#fff" font-weight="bold">BomiNuel</text>
            <text x="30" y="70" text-anchor="middle" font-family="sans-serif" font-size="3.5" fill="#ffd0c0">Zobo Hibiscus</text>
          </svg>
          <div class="card-tag">Welcome the little ones</div>
        </div>
        <div class="card-name">Naming Ceremonies</div>
      </div>

      <!-- School Events -->
      <div class="event-card">
        <div class="card-visual school">
          <div class="card-deco">🏆</div>
          <svg width="62" height="130" viewBox="0 0 60 130" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs><linearGradient id="cb4" x1="0" y1="0" x2="60" y2="130" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#e84535"/><stop offset="100%" stop-color="#7a1810"/></linearGradient></defs>
            <rect x="22" y="0" width="16" height="10" rx="3" fill="#8a1c10"/>
            <rect x="19" y="8" width="22" height="8" rx="3" fill="#7a1810"/>
            <rect x="10" y="15" width="40" height="108" rx="10" fill="url(#cb4)"/>
            <rect x="13" y="34" width="34" height="60" rx="7" fill="rgba(255,255,255,0.12)"/>
            <text x="30" y="59" text-anchor="middle" font-family="Georgia,serif" font-size="5" fill="#fff" font-weight="bold">BomiNuel</text>
            <text x="30" y="70" text-anchor="middle" font-family="sans-serif" font-size="3.5" fill="#ffd0c0">Zobo Hibiscus</text>
          </svg>
          <div class="card-tag">For every achievement</div>
        </div>
        <div class="card-name">School Events</div>
      </div>

    </div>

    <button class="carousel-btn next" onclick="slide(1)">&#8594;</button>
  </div>
</section>






</body>
</html>
